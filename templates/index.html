<!DOCTYPE html>
<html>
<head>
  <title>Ollama AI Chatbot</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Poppins, Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1e3a8a, #7c3aed);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .chat-container {
      width: 430px;
      height: 620px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border-radius: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.25);
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px;
      background: rgba(255,255,255,0.15);
      text-align: center;
    }

    .header h2 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin: 5px 0 0;
      font-size: 13px;
      color: #dbeafe;
    }

    #messages {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 14px;
      padding: 12px 15px;
      border-radius: 16px;
      max-width: 82%;
      line-height: 1.4;
      animation: pop 0.25s ease;
      font-size: 14px;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: rgba(255,255,255,0.2);
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    .typing {
      font-style: italic;
      color: #c7d2fe;
      font-size: 13px;
      margin-left: 10px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: rgba(255,255,255,0.12);
    }

    input {
      flex: 1;
      border: none;
      outline: none;
      padding: 13px;
      border-radius: 30px;
      font-size: 14px;
    }

    button {
      border: none;
      background: linear-gradient(135deg, #22c55e, #14b8a6);
      color: white;
      padding: 0 18px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #22c55e;
    }

    .quick-buttons {
      display: flex;
      gap: 8px;
      padding: 0 15px 12px;
      overflow-x: auto;
    }

    .quick-buttons button {
      background: rgba(255,255,255,0.18);
      white-space: nowrap;
      font-size: 12px;
      padding: 8px 12px;
    }

    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">
    <h2>🤖 Personal AI Chatbot</h2>
    <p>welcome</p>
  </div>

  <div id="messages">
    <div class="message bot">Hi Teju 👋 Ask me anything!</div>
  </div>

  <div class="quick-buttons">
    <button onclick="quickAsk('Explain Python simply')">Python</button>
    <button onclick="quickAsk('Give me a project idea')">Project Idea</button>
    <button onclick="quickAsk('Motivate me to study')">Motivation</button>
    <button onclick="quickAsk('Explain AI in simple words')">AI</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your message..." onkeydown="handleKey(event)">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  async function sendMessage() {
    const input = document.getElementById("userInput");
    const messages = document.getElementById("messages");
    const message = input.value.trim();

    if (!message) return;

    messages.innerHTML += `<div class="message user">${message}</div>`;
    input.value = "";

    const typingId = "typing-" + Date.now();
    messages.innerHTML += `<div id="${typingId}" class="typing">Bot is typing...</div>`;
    messages.scrollTop = messages.scrollHeight;

    try {
      const response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
      });

      const data = await response.json();
      document.getElementById(typingId).remove();

      messages.innerHTML += `<div class="message bot">${data.reply}</div>`;
      messages.scrollTop = messages.scrollHeight;

    } catch (error) {
      document.getElementById(typingId).remove();
      messages.innerHTML += `<div class="message bot">Error connecting to server.</div>`;
    }
  }

  function handleKey(event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  }

  function quickAsk(text) {
    document.getElementById("userInput").value = text;
    sendMessage();
  }
</script>

</body>
</html>
